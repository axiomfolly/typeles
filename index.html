<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typ Les — Ruimte Avontuur 🚀</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}
#stars-bg {
  position: fixed; inset: 0; pointer-events: none;
}
#app {
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 16px;
}

/* Top bar */
#topbar {
  width: 100%; max-width: 900px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
#progress-dots { display: flex; gap: 8px; }
.dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #334; border: 2px solid #556;
  transition: all .3s;
}
.dot.done { background: #ffd700; border-color: #ffa500; }
.dot.active { background: #4af; border-color: #08f; box-shadow: 0 0 8px #4af; }
#star-counter {
  font-size: 1.1rem; color: #ffd700; display: flex; align-items: center; gap: 6px;
}
#sound-btn {
  background: #334; border: none; color: #aaa; font-size: 1.2rem;
  padding: 6px 10px; border-radius: 8px; cursor: pointer; transition: all .2s;
}
#sound-btn:hover { background: #446; color: #fff; }

/* Level title */
#level-title {
  font-size: 1rem; color: #8af; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 8px;
}

/* Target display */
#target-wrap {
  display: flex; gap: 6px; align-items: center; justify-content: center;
  min-height: 120px; margin: 12px 0;
  flex-wrap: wrap;
}
.letter-box {
  display: flex; flex-direction: column; align-items: center;
}
.target-char {
  font-size: 5rem; font-weight: bold; line-height: 1;
  color: #e0e0ff;
  transition: all .15s;
  text-transform: uppercase;
}
.target-char.typed { color: #4f4; }
.target-char.current {
  color: #4af;
  text-shadow: 0 0 20px #4af;
  animation: pulse 1s infinite;
}
.target-char.wrong {
  color: #f44;
  animation: wobble .3s ease;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
@keyframes wobble {
  0%{transform:translateX(0)} 25%{transform:translateX(-8px)}
  75%{transform:translateX(8px)} 100%{transform:translateX(0)}
}
.target-char.space-char { font-size: 2rem; color: #556; }

/* Instruction */
#instruction {
  font-size: 1.1rem; color: #aaa; text-align: center; margin-bottom: 8px;
  min-height: 28px;
}

/* Streak */
#streak-display {
  font-size: 1rem; color: #ffd700; min-height: 24px; text-align: center;
  margin-bottom: 8px;
}

/* Keyboard */
#keyboard-wrap {
  margin-top: auto; padding-bottom: 4px; width: 100%; max-width: 760px;
}
#keyboard { display: flex; flex-direction: column; gap: 5px; align-items: center; }
.key-row { display: flex; gap: 5px; }
.key {
  width: 48px; height: 44px;
  border-radius: 6px; border: none;
  font-size: .85rem; font-weight: bold; color: #fff;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; cursor: default;
  opacity: .7;
}
.key.wide { width: 72px; }
.key.wider { width: 96px; }
.key.space { width: 280px; }
/* Finger colors */
.f-pink   { background: #7b2d7b; }
.f-red    { background: #8b2020; }
.f-orange { background: #8b5020; }
.f-yellow { background: #7a7a10; }
.f-green  { background: #1a6e1a; }
.f-other  { background: #2a3a4a; }
.key.active-key {
  opacity: 1; box-shadow: 0 0 12px rgba(255,255,255,.5);
  transform: scale(1.15);
}
.key.correct-flash { background: #2a8a2a !important; opacity: 1; }
.key.wrong-flash   { background: #8a2a2a !important; opacity: 1; }

/* Mascot */
#mascot-wrap {
  position: fixed; bottom: 16px; right: 16px;
  width: 80px; height: 80px;
  transition: transform .2s;
}
#mascot-wrap.bounce { animation: bounce .4s ease; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
#mascot-wrap.spin { animation: spin .5s ease; }
@keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }

/* Confetti */
.confetti-piece {
  position: fixed; pointer-events: none;
  width: 8px; height: 8px; border-radius: 2px;
  animation: confetti-fall 1s ease forwards;
}
@keyframes confetti-fall {
  0%   { opacity:1; transform: translate(0,0) rotate(0deg); }
  100% { opacity:0; transform: translate(var(--cx),var(--cy)) rotate(720deg); }
}

/* Float up word */
.float-word {
  position: fixed; pointer-events: none;
  font-size: 1.5rem; font-weight: bold; color: #ffd700;
  animation: float-up 1s ease forwards;
}
@keyframes float-up {
  0%   { opacity:1; transform: translateY(0); }
  100% { opacity:0; transform: translateY(-80px); }
}

/* Screen overlays */
#overlay {
  position: fixed; inset: 0; background: rgba(0,0,5,.9);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; z-index: 100;
}
#overlay.hidden { display: none; }
#overlay h1 { font-size: 2.5rem; color: #4af; }
#overlay h2 { font-size: 1.8rem; color: #ffd700; }
#overlay p  { font-size: 1.1rem; color: #ccc; text-align: center; max-width: 400px; }
.btn {
  padding: 14px 36px; font-size: 1.2rem; font-weight: bold;
  border: none; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, #4af, #08f);
  color: #fff; transition: all .2s;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(68,170,255,.5); }
.btn.secondary {
  background: linear-gradient(135deg, #556, #334);
  font-size: 1rem; padding: 10px 24px;
}
#stars-display { font-size: 3rem; }
</style>
</head>
<body>
<canvas id="stars-bg"></canvas>

<div id="app">
  <div id="topbar">
    <div id="progress-dots"></div>
    <div id="star-counter">⭐ <span id="star-count">0</span></div>
    <button id="sound-btn" onclick="toggleSound()">🔊</button>
  </div>
  <div id="level-title"></div>
  <div id="instruction"></div>
  <div id="target-wrap"></div>
  <div id="streak-display"></div>
  <div id="keyboard-wrap">
    <div id="keyboard"></div>
  </div>
</div>

<!-- Mascot SVG -->
<div id="mascot-wrap">
  <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="40" cy="62" rx="20" ry="8" fill="#1a1a3a" opacity=".5"/>
    <!-- Body -->
    <rect x="22" y="38" width="36" height="28" rx="8" fill="#3a5fa0"/>
    <!-- Helmet -->
    <circle cx="40" cy="30" r="20" fill="#2a4a80"/>
    <circle cx="40" cy="30" r="16" fill="#c8e8ff" opacity=".9"/>
    <!-- Face -->
    <circle cx="34" cy="28" r="4" fill="#0a0a2a"/>
    <circle cx="46" cy="28" r="4" fill="#0a0a2a"/>
    <circle cx="35" cy="27" r="1.5" fill="#fff"/>
    <circle cx="47" cy="27" r="1.5" fill="#fff"/>
    <path d="M34 35 Q40 40 46 35" stroke="#0a0a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arms -->
    <rect x="8" y="40" width="14" height="8" rx="4" fill="#3a5fa0"/>
    <rect x="58" y="40" width="14" height="8" rx="4" fill="#3a5fa0"/>
    <!-- Legs -->
    <rect x="26" y="62" width="10" height="12" rx="4" fill="#2a4a80"/>
    <rect x="44" y="62" width="10" height="12" rx="4" fill="#2a4a80"/>
    <!-- Helmet ring -->
    <circle cx="40" cy="30" r="20" fill="none" stroke="#5a8ad0" stroke-width="2"/>
    <!-- Antenna -->
    <line x1="40" y1="10" x2="40" y2="2" stroke="#5a8ad0" stroke-width="2"/>
    <circle cx="40" cy="2" r="3" fill="#ffd700"/>
  </svg>
</div>

<!-- Overlay -->
<div id="overlay">
  <h1>🚀 Typ Les</h1>
  <h2>Ruimte Avontuur</h2>
  <p>Leer typen met de ruimtepiloot! Typ de letters die je ziet. Geen haast — doe het rustig aan.</p>
  <button class="btn" onclick="startGame()">Begin!</button>
</div>

<script>
// ==================== DATA ====================
const LEVELS = [
  {
    name: 'Niveau 1 — Thuisrij',
    desc: 'Typ de letter die je ziet',
    items: ['a','s','d','f','j','k','l','a','s','d','f','j','k','l','a','j','s','k','d','l']
  },
  {
    name: 'Niveau 2 — Alle letters',
    desc: 'Typ de letter die je ziet',
    items: 'qwertyuiopasdfghjklzxcvbnm'.split('').concat('abcdefghijklmnopqrstuvwxyz'.split(''))
  },
  {
    name: 'Niveau 3 — Twee letters',
    desc: 'Typ het woord',
    items: ['at','op','in','de','en','is','te','om','af','al','er','je','ze','we','al','op']
  },
  {
    name: 'Niveau 4 — Korte woorden',
    desc: 'Typ het woord',
    items: ['kat','bal','zon','dag','hut','mus','rij','hek','vis','tak','pot','mok','bus','dak','neus','spin','klok','boom']
  },
  {
    name: 'Niveau 5 — Langere woorden',
    desc: 'Typ het woord',
    items: ['boom','fiets','steen','appel','kikker','vlieg','lopen','regen','melk','brood','schaap','tafel','stoel','zwaan','piano']
  },
  {
    name: 'Niveau 6 — Zinnen',
    desc: 'Typ de zin',
    items: ['de kat zit','een rode bal','de hond loopt','ik typ goed','de zon schijnt','een grote boom','de vis zwemt','hallo wereld']
  }
];

// Keyboard layout with finger zones
const KB_ROWS = [
  [{k:'q',f:'pink'},{k:'w',f:'red'},{k:'e',f:'orange'},{k:'r',f:'yellow'},{k:'t',f:'yellow'},
   {k:'y',f:'green'},{k:'u',f:'green'},{k:'i',f:'orange'},{k:'o',f:'red'},{k:'p',f:'pink'}],
  [{k:'a',f:'pink'},{k:'s',f:'red'},{k:'d',f:'orange'},{k:'f',f:'yellow'},{k:'g',f:'yellow'},
   {k:'h',f:'green'},{k:'j',f:'green'},{k:'k',f:'orange'},{k:'l',f:'red'},{k:';',f:'pink'}],
  [{k:'z',f:'pink'},{k:'x',f:'red'},{k:'c',f:'orange'},{k:'v',f:'yellow'},{k:'b',f:'yellow'},
   {k:'n',f:'green'},{k:'m',f:'green'},{k:',',f:'orange'},{k:'.',f:'red'},{k:'/',f:'pink'}],
  [{k:' ',f:'other',cls:'space',label:'spatie'}]
];
const F_COLOR = {pink:'f-pink',red:'f-red',orange:'f-orange',yellow:'f-yellow',green:'f-green',other:'f-other'};

// ==================== STATE ====================
let soundOn = true;
let currentLevel = 0;
let currentItemIdx = 0;
let currentCharIdx = 0;
let totalStars = 0;
let streak = 0;
let mistakes = 0;
let totalChars = 0;
let audioCtx = null;

const ITEMS_PER_LESSON = 8;

function getItems() {
  const lvl = LEVELS[currentLevel];
  const items = [...lvl.items];
  // shuffle for variety
  for(let i=items.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [items[i],items[j]]=[items[j],items[i]];
  }
  return items.slice(0, ITEMS_PER_LESSON);
}
let lessonItems = [];

// ==================== AUDIO ====================
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol=0.3) {
  if (!soundOn) return;
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playCorrect() { playTone(880, 'sine', .12, .2); }
function playWrong() { playTone(180, 'sawtooth', .15, .15); }
function playWord() {
  if(!soundOn) return;
  [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',.15,.2), i*80));
}
function playFanfare() {
  if(!soundOn) return;
  const notes = [523,587,659,698,784,880,988,1047];
  notes.forEach((f,i) => setTimeout(() => playTone(f,'sine',.2,.25), i*100));
}
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
}

// ==================== STARS ====================
function initStars() {
  const c = document.getElementById('stars-bg');
  const ctx2 = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  for(let i=0;i<200;i++){
    const x=Math.random()*c.width, y=Math.random()*c.height;
    const r=Math.random()*1.5+.5;
    ctx2.fillStyle=`rgba(255,255,255,${Math.random()*.8+.2})`;
    ctx2.beginPath(); ctx2.arc(x,y,r,0,Math.PI*2); ctx2.fill();
  }
}

// ==================== UI ====================
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KB_ROWS.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'key-row';
    row.forEach(({k,f,cls,label}) => {
      const key = document.createElement('div');
      key.className = `key ${F_COLOR[f]}${cls?' '+cls:''}`;
      key.dataset.key = k;
      key.textContent = label || k.toUpperCase();
      rowDiv.appendChild(key);
    });
    kb.appendChild(rowDiv);
  });
}

function buildProgressDots() {
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  for(let i=0;i<ITEMS_PER_LESSON;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentItemIdx ? ' done' : i === currentItemIdx ? ' active' : '');
    dots.appendChild(d);
  }
}

function renderTarget() {
  const wrap = document.getElementById('target-wrap');
  wrap.innerHTML = '';
  const target = lessonItems[currentItemIdx];
  if (!target) return;

  [...target].forEach((ch, i) => {
    const box = document.createElement('div');
    box.className = 'letter-box';
    const span = document.createElement('span');
    span.className = 'target-char' +
      (ch === ' ' ? ' space-char' : '') +
      (i < currentCharIdx ? ' typed' : i === currentCharIdx ? ' current' : '');
    span.dataset.idx = i;
    span.textContent = ch === ' ' ? '␣' : ch.toUpperCase();
    box.appendChild(span);
    wrap.appendChild(box);
  });

  // Highlight active key on keyboard
  document.querySelectorAll('.key').forEach(k => k.classList.remove('active-key'));
  const nextChar = target[currentCharIdx];
  if(nextChar) {
    const keyEl = document.querySelector(`.key[data-key="${nextChar === ' ' ? ' ' : nextChar}"]`);
    if(keyEl) keyEl.classList.add('active-key');
  }

  document.getElementById('instruction').textContent =
    LEVELS[currentLevel].desc;
}

function updateStreak() {
  const el = document.getElementById('streak-display');
  if(streak >= 5) el.textContent = `🔥 ${streak} op rij!`;
  else if(streak >= 3) el.textContent = `✨ Goed bezig! ${streak} op rij`;
  else el.textContent = '';
}

// ==================== CONFETTI ====================
function spawnConfetti(x, y) {
  const colors = ['#ffd700','#ff6b6b','#4af','#90d030','#ff9f40'];
  for(let i=0;i<12;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${x}px;top:${y}px;background:${colors[Math.floor(Math.random()*colors.length)]};
      --cx:${(Math.random()-0.5)*120}px;--cy:${-(Math.random()*80+40)}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}

function floatWord(text, x, y) {
  const el = document.createElement('div');
  el.className = 'float-word';
  el.textContent = text;
  el.style.cssText = `left:${x-30}px;top:${y}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ==================== MASCOT ====================
function mascotBounce() {
  const m = document.getElementById('mascot-wrap');
  m.classList.remove('bounce','spin');
  void m.offsetWidth;
  m.classList.add('bounce');
  setTimeout(() => m.classList.remove('bounce'), 500);
}
function mascotSpin() {
  const m = document.getElementById('mascot-wrap');
  m.classList.remove('bounce','spin');
  void m.offsetWidth;
  m.classList.add('spin');
  setTimeout(() => m.classList.remove('spin'), 600);
}

// ==================== GAME LOGIC ====================
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  const saved = localStorage.getItem('typeles_progress');
  if(saved) {
    try {
      const p = JSON.parse(saved);
      currentLevel = p.level || 0;
      totalStars = p.stars || 0;
    } catch(e) {}
  }
  document.getElementById('star-count').textContent = totalStars;
  startLevel();
}

function startLevel() {
  currentItemIdx = 0;
  currentCharIdx = 0;
  mistakes = 0;
  totalChars = 0;
  streak = 0;
  lessonItems = getItems();
  document.getElementById('level-title').textContent = LEVELS[currentLevel].name;
  buildProgressDots();
  renderTarget();
  updateStreak();
}

function handleKey(key) {
  if(currentItemIdx >= lessonItems.length) return;
  const target = lessonItems[currentItemIdx];
  const expectedChar = target[currentCharIdx];

  if(key === ' ' && expectedChar !== ' ') return; // ignore space unless expected

  const isCorrect = key.toLowerCase() === expectedChar.toLowerCase();
  totalChars++;

  // Flash key
  const keyEl = document.querySelector(`.key[data-key="${key === ' ' ? ' ' : key.toLowerCase()}"]`);

  if(isCorrect) {
    playCorrect();
    streak++;
    if(keyEl) { keyEl.classList.add('correct-flash'); setTimeout(()=>keyEl.classList.remove('correct-flash'),200); }

    // Mark typed
    const span = document.querySelector(`.target-char[data-idx="${currentCharIdx}"]`);
    if(span) { span.classList.remove('current'); span.classList.add('typed'); }

    currentCharIdx++;
    updateStreak();

    if(streak === 3 || streak === 6 || streak === 9) mascotBounce();

    if(currentCharIdx >= target.length) {
      // Word/item complete
      const wrap = document.getElementById('target-wrap');
      const rect = wrap.getBoundingClientRect();
      spawnConfetti(rect.left + rect.width/2, rect.top + rect.height/2);
      floatWord('✓ ' + target, rect.left + rect.width/2, rect.top);
      playWord();
      if(streak >= 5) mascotSpin();

      currentItemIdx++;
      currentCharIdx = 0;
      buildProgressDots();

      if(currentItemIdx >= lessonItems.length) {
        setTimeout(showLessonComplete, 600);
      } else {
        setTimeout(renderTarget, 500);
      }
    } else {
      renderTarget();
    }
  } else {
    playWrong();
    mistakes++;
    streak = 0;
    updateStreak();
    if(keyEl) { keyEl.classList.add('wrong-flash'); setTimeout(()=>keyEl.classList.remove('wrong-flash'),300); }

    // Wobble current char
    const span = document.querySelector(`.target-char[data-idx="${currentCharIdx}"]`);
    if(span) {
      span.classList.add('wrong');
      setTimeout(() => span.classList.remove('wrong'), 300);
    }
  }
}

function showLessonComplete() {
  playFanfare();
  mascotSpin();

  const accuracy = Math.round(((totalChars - mistakes) / totalChars) * 100);
  const stars = accuracy >= 95 ? 3 : accuracy >= 80 ? 2 : 1;
  totalStars += stars;
  document.getElementById('star-count').textContent = totalStars;

  // Save progress
  const nextLevel = currentLevel + 1 < LEVELS.length ? currentLevel + 1 : currentLevel;
  localStorage.setItem('typeles_progress', JSON.stringify({level: nextLevel, stars: totalStars}));

  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <h2>🎉 Goed gedaan!</h2>
    <div id="stars-display">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <p>Nauwkeurigheid: ${accuracy}%<br>Totale sterren: ${totalStars} ⭐</p>
    ${currentLevel + 1 < LEVELS.length
      ? `<button class="btn" onclick="nextLevel()">Volgende niveau →</button>`
      : `<h2>🏆 Je hebt alles gehaald!</h2>`
    }
    <button class="btn secondary" onclick="repeatLevel()">Herhaal niveau</button>
  `;
  overlay.classList.remove('hidden');

  // Confetti burst
  for(let i=0;i<5;i++) {
    setTimeout(() => {
      spawnConfetti(Math.random()*window.innerWidth, Math.random()*window.innerHeight/2);
    }, i*200);
  }
}

function nextLevel() {
  currentLevel++;
  document.getElementById('overlay').classList.add('hidden');
  startLevel();
}
function repeatLevel() {
  document.getElementById('overlay').classList.add('hidden');
  startLevel();
}

// ==================== INPUT ====================
document.addEventListener('keydown', (e) => {
  if(e.ctrlKey || e.altKey || e.metaKey) return;
  if(e.key.length === 1) {
    e.preventDefault();
    handleKey(e.key);
  } else if(e.key === ' ') {
    e.preventDefault();
    handleKey(' ');
  }
});

// ==================== INIT ====================
initStars();
buildKeyboard();
window.addEventListener('resize', initStars);
</script>
</body>
</html>
