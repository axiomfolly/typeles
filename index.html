<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typ Les — Ruimte Avontuur 🚀</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}
#stars-bg {
  position: fixed; inset: 0; pointer-events: none;
}
#app {
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 16px;
}

/* Top bar */
#topbar {
  width: 100%; max-width: 900px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
#progress-dots { display: flex; gap: 8px; flex-wrap: wrap; max-width: 400px; }
.dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #334; border: 2px solid #556;
  transition: all .3s;
}
.dot.done { background: #ffd700; border-color: #ffa500; }
.dot.active { background: #4af; border-color: #08f; box-shadow: 0 0 8px #4af; }
.dot.mini { width: 9px; height: 9px; }
.dot.godmode-dot { cursor: pointer; }
.dot.godmode-dot:hover { transform: scale(1.5); box-shadow: 0 0 8px #ffd700; border-color: #ffd700; }
#star-counter {
  font-size: 1.1rem; color: #ffd700; display: flex; align-items: center; gap: 6px;
}
#sound-btn {
  background: #334; border: none; color: #aaa; font-size: 1.2rem;
  padding: 6px 10px; border-radius: 8px; cursor: pointer; transition: all .2s;
}
#sound-btn:hover { background: #446; color: #fff; }

/* Level title */
#level-title {
  font-size: 1rem; color: #8af; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 8px; transition: color .2s;
}
#level-title.godmode-title {
  cursor: pointer;
  text-decoration: underline dotted #ffd700;
  color: #ffd700;
}
#level-title.godmode-title:hover { color: #ffec60; }

/* Target display */
#target-wrap {
  display: flex; gap: 6px; align-items: center; justify-content: center;
  min-height: 120px; margin: 12px 0;
  flex-wrap: wrap;
}
.letter-box {
  display: flex; flex-direction: column; align-items: center;
}
.target-char {
  font-size: 5rem; font-weight: bold; line-height: 1;
  color: #e0e0ff;
  transition: all .15s;
  text-transform: uppercase;
}
.target-char.typed { color: #4f4; }
.target-char.current {
  color: #4af;
  text-shadow: 0 0 20px #4af;
  animation: pulse 1s infinite;
}
.target-char.wrong {
  color: #f44;
  animation: wobble .3s ease;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
@keyframes wobble {
  0%{transform:translateX(0)} 25%{transform:translateX(-8px)}
  75%{transform:translateX(8px)} 100%{transform:translateX(0)}
}
.target-char.space-char { font-size: 2rem; color: #556; }

/* Instruction */
#instruction {
  font-size: 1.1rem; color: #aaa; text-align: center; margin-bottom: 8px;
  min-height: 28px;
}

/* Streak */
#streak-display {
  font-size: 1rem; color: #ffd700; min-height: 24px; text-align: center;
  margin-bottom: 8px;
}

/* Keyboard */
#keyboard-wrap {
  margin-top: auto; padding-bottom: 4px; width: 100%; max-width: 760px;
}
#keyboard { display: flex; flex-direction: column; gap: 5px; align-items: center; }
.key-row { display: flex; gap: 5px; }
.key {
  width: 48px; height: 44px;
  border-radius: 6px; border: none;
  font-size: .85rem; font-weight: bold; color: #fff;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; cursor: default;
  opacity: .7;
}
.key.wide { width: 72px; }
.key.wider { width: 96px; }
.key.space { width: 280px; }
/* Finger colors */
.f-pink   { background: #7b2d7b; }
.f-red    { background: #8b2020; }
.f-orange { background: #8b5020; }
.f-yellow { background: #7a7a10; }
.f-green  { background: #1a6e1a; }
.f-other  { background: #2a3a4a; }
.key.active-key {
  opacity: 1; box-shadow: 0 0 12px rgba(255,255,255,.5);
  transform: scale(1.15);
}
.key.correct-flash { background: #2a8a2a !important; opacity: 1; }
.key.wrong-flash   { background: #8a2a2a !important; opacity: 1; }

/* Mascot */
#mascot-wrap {
  position: fixed; bottom: 16px; right: 16px;
  width: 80px; height: 80px;
  transition: transform .2s;
}
#mascot-wrap.bounce { animation: bounce .4s ease; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
#mascot-wrap.spin { animation: spin .5s ease; }
@keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }

/* Confetti */
.confetti-piece {
  position: fixed; pointer-events: none;
  width: 8px; height: 8px; border-radius: 2px;
  animation: confetti-fall 1s ease forwards;
}
@keyframes confetti-fall {
  0%   { opacity:1; transform: translate(0,0) rotate(0deg); }
  100% { opacity:0; transform: translate(var(--cx),var(--cy)) rotate(720deg); }
}

/* Float up word */
.float-word {
  position: fixed; pointer-events: none;
  font-size: 1.5rem; font-weight: bold; color: #ffd700;
  animation: float-up 1s ease forwards;
}
@keyframes float-up {
  0%   { opacity:1; transform: translateY(0); }
  100% { opacity:0; transform: translateY(-80px); }
}

/* Screen overlays */
#overlay {
  position: fixed; inset: 0; background: rgba(0,0,5,.9);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; z-index: 100;
}
#overlay.hidden { display: none; }
#overlay h1 { font-size: 2.5rem; color: #4af; }
#overlay h2 { font-size: 1.8rem; color: #ffd700; }
#overlay p  { font-size: 1.1rem; color: #ccc; text-align: center; max-width: 400px; }
.btn {
  padding: 14px 36px; font-size: 1.2rem; font-weight: bold;
  border: none; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, #4af, #08f);
  color: #fff; transition: all .2s;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(68,170,255,.5); }
.btn.secondary {
  background: linear-gradient(135deg, #556, #334);
  font-size: 1rem; padding: 10px 24px;
}
#stars-display { font-size: 3rem; }

/* ===== CHARACTER REVEAL CARD ===== */
@keyframes reveal-scale-in {
  from { opacity: 0; transform: scale(.82); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes emoji-pop {
  0%   { transform: scale(0) rotate(-20deg); }
  55%  { transform: scale(1.25) rotate(6deg); }
  75%  { transform: scale(.92) rotate(-3deg); }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes slide-up-in {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
.char-reveal {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; cursor: pointer;
  animation: reveal-scale-in .4s cubic-bezier(.34,1.56,.64,1) forwards;
}
.reveal-emoji {
  font-size: 5.5rem; line-height: 1;
  animation: emoji-pop .65s cubic-bezier(.34,1.56,.64,1) .05s both;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.35));
}
.reveal-name {
  font-size: 2.8rem; font-weight: bold; color: #fff;
  text-shadow: 0 2px 20px rgba(0,0,0,.5);
  text-transform: capitalize;
  animation: slide-up-in .4s ease .15s both;
}
.reveal-quote {
  font-size: 1.25rem; font-style: italic; color: rgba(255,255,255,.92);
  text-align: center; max-width: 520px; padding: 0 24px;
  text-shadow: 0 1px 8px rgba(0,0,0,.4);
  animation: slide-up-in .4s ease .25s both;
}
.reveal-img-wrap {
  height: 130px; display: flex; align-items: center; justify-content: center;
  animation: slide-up-in .4s ease .3s both;
}
.reveal-img {
  width: 120px; height: 120px; object-fit: cover; object-position: top;
  border-radius: 18px; border: 3px solid rgba(255,255,255,.45);
  box-shadow: 0 8px 32px rgba(0,0,0,.45);
}
.reveal-hint {
  font-size: .82rem; color: rgba(255,255,255,.55);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-top: 6px;
  animation: slide-up-in .4s ease .4s both;
}

/* ===== GODMODE FLASH ===== */
#godmode-flash {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, #ffd700, #ff8c00);
  color: #000; font-weight: bold; font-size: 1.1rem;
  padding: 10px 28px; border-radius: 28px;
  box-shadow: 0 4px 24px rgba(255,200,0,.55);
  z-index: 400; pointer-events: none;
  animation: godflash 2.8s ease forwards;
}
@keyframes godflash {
  0%   { opacity:0; transform:translateX(-50%) translateY(-18px) scale(.9); }
  12%  { opacity:1; transform:translateX(-50%) translateY(0)     scale(1.05); }
  20%  { transform:translateX(-50%) translateY(0) scale(1); }
  75%  { opacity:1; }
  100% { opacity:0; transform:translateX(-50%) translateY(-10px); }
}

/* ===== LEVEL SELECT MODAL (godmode) ===== */
#level-select-modal {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,10,.88);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
}
#level-select-modal h2 { font-size: 1.5rem; color: #ffd700; margin-bottom: 6px; }
.level-select-btn {
  width: 340px; text-align: left; padding: 10px 22px;
  font-size: 1rem; font-weight: bold;
  border: none; border-radius: 10px; cursor: pointer;
  background: linear-gradient(135deg, #2a3a50, #1a2535);
  color: #cce; transition: all .15s;
}
.level-select-btn:hover { background: linear-gradient(135deg, #3a5070, #2a3550); color: #fff; }
.level-select-btn.current-level { background: linear-gradient(135deg, #4af, #08f); color: #fff; }
</style>
</head>

    desc: 'Typ het woord',
    items: ['boom','fiets','steen','appel','kikker','vlieg','lopen','regen','melk','brood','schaap','tafel','stoel','zwaan','piano','pikachu','eevee','stitch','angel','jasmine','aladdin','ladybug','smurfin']
  },
  {
    name: 'Niveau 6 — Zinnen',
    desc: 'Typ de zin',
    items: ['de kat zit','een rode bal','de hond loopt','ik typ goed','de zon schijnt','een grote boom','de vis zwemt','hallo wereld']
  },
  {
    name: 'Niveau 7 — Tekenfilmhelden',
    desc: 'Typ de naam van het karakter',
    bonus: true,
    items: [
      'hilda','twijg',
      'fin','jake',
      'spongebob','patrick',
      'alfred jodocus kwak','henk','winnie',
      'ladybug','cat noir',
      'pikachu','eevee','charmander',
      'rumi','mira','jinu','zoey',
      'smurfin','brilsmurf','grote smurf','luilaksmurf',
      'kirby','prinses peach','yoshi','mario',
      'stitch','lilo','angel',
      'jasmine','aladdin'
    ]
  }
];

const BONUS_CHARACTERS = {
  'hilda':               { emoji:'🧢', bg:'#2a5a8a,#4a8ab5', wiki:'Hilda_(TV_series)',                  quote:'Er is vast een magische verklaring!' },
  'twijg':               { emoji:'🦌', bg:'#8b6914,#b89040', wiki:null,                                  quote:'*kijkt met grote ogen* ♡' },
  'fin':                 { emoji:'⚔️', bg:'#6ab0c8,#3a80a0', wiki:'Finn_the_Human',                     quote:'Algebraïsch! Dat is helemaal episch!' },
  'jake':                { emoji:'🐕', bg:'#e8a030,#c07820', wiki:'Jake_the_Dog',                        quote:'Het is wiskunde, broertje!' },
  'spongebob':           { emoji:'🧽', bg:'#f0d020,#c0a800', wiki:'SpongeBob_SquarePants_(character)',   quote:'Ben jij klaar? IK BEN KLAAR!' },
  'patrick':             { emoji:'⭐', bg:'#d46080,#b04060', wiki:'Patrick_Star_(character)',            quote:'Is mayonaise een instrument?' },
  'alfred jodocus kwak': { emoji:'🦆', bg:'#f0a030,#c07810', wiki:'Alfred_Jodocus_Kwak',                quote:'Alles komt goed, dat weet ik zeker!' },
  'henk':                { emoji:'🐾', bg:'#786050,#504030', wiki:null,                                  quote:'Dag Alfred! Fijn je te zien!' },
  'winnie':              { emoji:'🐘', bg:'#a090c0,#706090', wiki:null,                                  quote:'Vriendschap is het allermooiste!' },
  'ladybug':             { emoji:'🐞', bg:'#cc1122,#990011', wiki:'Miraculous_Ladybug_(character)',      quote:'Pas op, schurk! Miraculous Ladybug!' },
  'cat noir':            { emoji:'🐱', bg:'#181828,#303050', wiki:'Cat_Noir',                            quote:'Cataclysme! Wacht... nog niet.' },

  'zoey':                { emoji:'🌟', bg:'#e08020,#b05000', wiki:null,                                  quote:'Vrienden voor altijd!' },

// Keyboard layout with finger zones
const KB_ROWS = [
  [{k:'q',f:'pink'},{k:'w',f:'red'},{k:'e',f:'orange'},{k:'r',f:'yellow'},{k:'t',f:'yellow'},
   {k:'y',f:'green'},{k:'u',f:'green'},{k:'i',f:'orange'},{k:'o',f:'red'},{k:'p',f:'pink'}],
  [{k:'a',f:'pink'},{k:'s',f:'red'},{k:'d',f:'orange'},{k:'f',f:'yellow'},{k:'g',f:'yellow'},
   {k:'h',f:'green'},{k:'j',f:'green'},{k:'k',f:'orange'},{k:'l',f:'red'},{k:';',f:'pink'}],
  [{k:'z',f:'pink'},{k:'x',f:'red'},{k:'c',f:'orange'},{k:'v',f:'yellow'},{k:'b',f:'yellow'},
   {k:'n',f:'green'},{k:'m',f:'green'},{k:',',f:'orange'},{k:'.',f:'red'},{k:'/',f:'pink'}],
  [{k:' ',f:'other',cls:'space',label:'spatie'}]
];
const F_COLOR = {pink:'f-pink',red:'f-red',orange:'f-orange',yellow:'f-yellow',green:'f-green',other:'f-other'};

// ==================== STATE ====================
let soundOn = true;
let currentLevel = 0;
let currentItemIdx = 0;
let currentCharIdx = 0;
let totalStars = 0;
let streak = 0;
let mistakes = 0;
let totalChars = 0;
let audioCtx = null;
let lessonItems = [];
let revealActive = false;  // blocks game input during character reveal

// Godmode state
let godmodeActive = false;
let godmodeBuffer = '';
const GODMODE_CODE = 'godmode';

const ITEMS_PER_LESSON = 8;

function getItems() {
  const lvl = LEVELS[currentLevel];
  // Bonus level: shuffle and take ITEMS_PER_LESSON
  const items = [...lvl.items];
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }
  return items.slice(0, ITEMS_PER_LESSON);
}

// ==================== AUDIO ====================
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol=0.3) {
  if (!soundOn) return;
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playCorrect() { playTone(880, 'sine', .12, .2); }
function playWrong()   { playTone(180, 'sawtooth', .15, .15); }
function playWord() {
  if (!soundOn) return;
  [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',.15,.2), i*80));
}
function playFanfare() {
  if (!soundOn) return;
  [523,587,659,698,784,880,988,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',.2,.25), i*100));
}
function playRevealJingle() {
  if (!soundOn) return;
  [784,988,1175,1568].forEach((f,i) => setTimeout(() => playTone(f,'sine',.25,.22), i*90));
}
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
}

// ==================== STARS ====================
function initStars() {
  const c = document.getElementById('stars-bg');
  const ctx2 = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  for (let i = 0; i < 200; i++) {
    const x = Math.random()*c.width, y = Math.random()*c.height;
    const r = Math.random()*1.5+.5;
    ctx2.fillStyle = `rgba(255,255,255,${Math.random()*.8+.2})`;
    ctx2.beginPath(); ctx2.arc(x,y,r,0,Math.PI*2); ctx2.fill();
  }
}

// ==================== UI ====================
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KB_ROWS.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'key-row';
    row.forEach(({k,f,cls,label}) => {
      const key = document.createElement('div');
      key.className = `key ${F_COLOR[f]}${cls?' '+cls:''}`;
      key.dataset.key = k;
      key.textContent = label || k.toUpperCase();
      rowDiv.appendChild(key);
    });
    kb.appendChild(rowDiv);
  });
}

function buildProgressDots() {
  const total = lessonItems.length;
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  const mini = total > 10;
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    let cls = 'dot';
    if (mini) cls += ' mini';
    if (i < currentItemIdx)    cls += ' done';
    else if (i === currentItemIdx) cls += ' active';
    if (godmodeActive)         cls += ' godmode-dot';
    d.className = cls;
    if (godmodeActive) {
      d.title = lessonItems[i] || `Item ${i+1}`;
      d.addEventListener('click', ((idx) => () => jumpToItem(idx))(i));
    }
    dots.appendChild(d);
  }
}

function renderTarget() {
  const wrap = document.getElementById('target-wrap');
  wrap.innerHTML = '';
  const target = lessonItems[currentItemIdx];
  if (!target) return;

  // Adaptive font size for long words/names
  const len = target.length;
  const fontSize = len > 16 ? '1.8rem' : len > 12 ? '2.6rem' : len > 8 ? '3.5rem' : len > 5 ? '4.2rem' : '5rem';

  [...target].forEach((ch, i) => {
    const box = document.createElement('div');
    box.className = 'letter-box';
    const span = document.createElement('span');
    span.className = 'target-char' +
      (ch === ' ' ? ' space-char' : '') +
      (i < currentCharIdx ? ' typed' : i === currentCharIdx ? ' current' : '');
    span.dataset.idx = i;
    span.style.fontSize = ch === ' ' ? '' : fontSize;
    span.textContent = ch === ' ' ? '␣' : ch.toUpperCase();
    box.appendChild(span);
    wrap.appendChild(box);
  });

  // Highlight active key
  document.querySelectorAll('.key').forEach(k => k.classList.remove('active-key'));
  const nextChar = target[currentCharIdx];
  if (nextChar) {
    const keyEl = document.querySelector(`.key[data-key="${nextChar === ' ' ? ' ' : nextChar}"]`);
    if (keyEl) keyEl.classList.add('active-key');
  }

  document.getElementById('instruction').textContent = LEVELS[currentLevel].desc;
}

function updateStreak() {
  const el = document.getElementById('streak-display');
  if (streak >= 5)      el.textContent = `🔥 ${streak} op rij!`;
  else if (streak >= 3) el.textContent = `✨ Goed bezig! ${streak} op rij`;
  else                  el.textContent = '';
}

// ==================== CONFETTI + FLOAT ====================
function spawnConfetti(x, y) {
  const colors = ['#ffd700','#ff6b6b','#4af','#90d030','#ff9f40'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${x}px;top:${y}px;background:${colors[Math.floor(Math.random()*colors.length)]};
      --cx:${(Math.random()-.5)*120}px;--cy:${-(Math.random()*80+40)}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}
function floatWord(text, x, y) {
  const el = document.createElement('div');
  el.className = 'float-word';
  el.textContent = text;
  el.style.cssText = `left:${x-30}px;top:${y}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ==================== MASCOT ====================
function mascotBounce() {
  const m = document.getElementById('mascot-wrap');
  m.classList.remove('bounce','spin'); void m.offsetWidth;
  m.classList.add('bounce');
  setTimeout(() => m.classList.remove('bounce'), 500);
}
function mascotSpin() {
  const m = document.getElementById('mascot-wrap');
  m.classList.remove('bounce','spin'); void m.offsetWidth;
  m.classList.add('spin');
  setTimeout(() => m.classList.remove('spin'), 600);
}

// ==================== WIKI IMAGE ====================
async function fetchWikiImage(wikiTitle) {
  if (!wikiTitle) return null;
  try {
    const resp = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`
    );
    if (!resp.ok) return null;
    const data = await resp.json();
    return data.thumbnail?.source || null;
  } catch (e) {
    return null;
  }
}

// ==================== CHARACTER REVEAL CARD ====================
function showCharacterReveal(charKey, onDismiss) {
  const data = BONUS_CHARACTERS[charKey] || {
    emoji: '⭐', bg: '#334455,#223344', wiki: null, quote: 'Geweldig getypt!'
  };
  const [bg1, bg2] = data.bg.split(',');

  playRevealJingle();

  const card = document.createElement('div');
  card.className = 'char-reveal';
  card.style.background = `linear-gradient(135deg, ${bg1}, ${bg2})`;

  // Display name: capitalize each word
  const displayName = charKey.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

  card.innerHTML = `
    <div class="reveal-emoji">${data.emoji}</div>
    <div class="reveal-name">${displayName}</div>
    <div class="reveal-quote">"${data.quote}"</div>
    <div class="reveal-img-wrap" id="reveal-img-wrap"></div>
    <div class="reveal-hint">Druk op Enter om verder te gaan</div>
  `;
  document.body.appendChild(card);

  // Async wiki image
  if (data.wiki) {
    fetchWikiImage(data.wiki).then(url => {
      if (!url) return;
      const wrap = document.getElementById('reveal-img-wrap');
      if (!wrap) return;
      const img = document.createElement('img');
      img.className = 'reveal-img';
      img.src = url;
      img.alt = displayName;
      wrap.appendChild(img);
    });
  }

  // Dismiss logic
  function dismiss() {
    if (!card.parentNode) return;
    card.remove();
    revealActive = false;
    onDismiss();
  }

  // Keyboard: Enter or Space
  function keyHandler(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      document.removeEventListener('keydown', keyHandler);
      dismiss();
    }
  }
  document.addEventListener('keydown', keyHandler);

  // Click anywhere on card
  card.addEventListener('click', () => {
    document.removeEventListener('keydown', keyHandler);
    dismiss();
  }, { once: true });
}

// ==================== MINI CHARACTER FLASH ====================
// For levels 4 & 5: show a brief auto-dismissing character card when a hero name is typed
function showCharacterFlash(charKey, onDone) {
  const data = BONUS_CHARACTERS[charKey];
  if (!data) { onDone(); return; }

  const [bg1, bg2] = data.bg.split(',');
  const displayName = charKey.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

  const card = document.createElement('div');
  card.style.cssText = `
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(0);
    background:linear-gradient(135deg,${bg1},${bg2});
    border-radius:20px; padding:24px 36px; z-index:150;
    text-align:center; box-shadow:0 8px 40px rgba(0,0,0,.7);
    pointer-events:none; transition:transform .25s cubic-bezier(.34,1.56,.64,1), opacity .25s;
    min-width:220px;
  `;
  card.innerHTML = `
    <div style="font-size:3.5rem;margin-bottom:8px">${data.emoji}</div>
    <div style="font-size:1.3rem;font-weight:bold;color:#fff;margin-bottom:6px">${displayName}</div>
    <div style="font-size:.85rem;color:rgba(255,255,255,.8);font-style:italic">"${data.quote}"</div>
    <div id="flash-img-wrap" style="margin-top:10px;display:flex;justify-content:center"></div>
  `;
  document.body.appendChild(card);

  // Animate in
  requestAnimationFrame(() => {
    card.style.transform = 'translate(-50%,-50%) scale(1)';
  });

  playRevealJingle();

  // Async wiki image — small thumbnail
  if (data.wiki) {
    fetchWikiImage(data.wiki).then(url => {
      if (!url) return;
      const wrap = card.querySelector('#flash-img-wrap');
      if (!wrap) return;
      const img = document.createElement('img');
      img.style.cssText = 'width:70px;height:70px;object-fit:cover;object-position:top;border-radius:50%;border:2px solid rgba(255,255,255,.5)';
      img.src = url;
      wrap.appendChild(img);
    });
  }

  // Auto-dismiss after 2.2s
  setTimeout(() => {
    card.style.opacity = '0';
    card.style.transform = 'translate(-50%,-60%) scale(0.9)';
    setTimeout(() => { card.remove(); onDone(); }, 250);
  }, 2200);
}

// ==================== GODMODE ====================
function activateGodmode() {
  if (godmodeActive) return;
  godmodeActive = true;

  // Flash message
  const flash = document.createElement('div');
  flash.id = 'godmode-flash';
  flash.textContent = '🔓 God Mode actief!';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 3000);

  // Rebuild dots with click handlers
  buildProgressDots();

  // Make level title clickable
  applyGodmodeTitle();
}

function applyGodmodeTitle() {
  const titleEl = document.getElementById('level-title');
  if (!titleEl) return;
  if (godmodeActive) {
    titleEl.classList.add('godmode-title');
    titleEl.title = 'Klik om van niveau te wisselen';
    titleEl.onclick = showLevelSelect;
  }
}

function jumpToItem(idx) {
  if (idx < 0 || idx >= lessonItems.length) return;
  currentItemIdx = idx;
  currentCharIdx = 0;
  buildProgressDots();
  renderTarget();
}

function showLevelSelect() {
  // Remove any existing modal
  const existing = document.getElementById('level-select-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'level-select-modal';

  const heading = document.createElement('h2');
  heading.textContent = '🔓 Kies een niveau';
  modal.appendChild(heading);

  LEVELS.forEach((lvl, idx) => {
    const btn = document.createElement('button');
    btn.className = 'level-select-btn' + (idx === currentLevel ? ' current-level' : '');
    btn.textContent = (idx === currentLevel ? '▶ ' : '    ') + lvl.name;
    btn.addEventListener('click', () => {
      modal.remove();
      currentLevel = idx;
      document.getElementById('overlay').classList.add('hidden');
      startLevel();
    });
    modal.appendChild(btn);
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'level-select-btn';
  cancelBtn.textContent = '    ✕ Annuleren';
  cancelBtn.style.marginTop = '8px';
  cancelBtn.addEventListener('click', () => modal.remove());
  modal.appendChild(cancelBtn);

  // Click backdrop to close
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

  // Escape to close
  function escHandler(e) {
    if (e.key === 'Escape') { document.removeEventListener('keydown', escHandler); modal.remove(); }
  }
  document.addEventListener('keydown', escHandler);

  document.body.appendChild(modal);
}

// ==================== GAME LOGIC ====================
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  const saved = localStorage.getItem('typeles_progress');
  if (saved) {
    try {
      const p = JSON.parse(saved);
      currentLevel = p.level || 0;
      totalStars   = p.stars  || 0;
    } catch(e) {}
  }
  document.getElementById('star-count').textContent = totalStars;
  startLevel();
}

function startLevel() {
  currentItemIdx = 0;
  currentCharIdx = 0;
  mistakes   = 0;
  totalChars = 0;
  streak     = 0;
  revealActive = false;
  lessonItems  = getItems();

  const titleEl = document.getElementById('level-title');
  titleEl.textContent = LEVELS[currentLevel].name;
  titleEl.classList.remove('godmode-title');
  titleEl.onclick = null;
  titleEl.title = '';
  if (godmodeActive) applyGodmodeTitle();

  buildProgressDots();
  renderTarget();
  updateStreak();
}

function handleKey(key) {
  if (revealActive) return;
  if (currentItemIdx >= lessonItems.length) return;

  const target = lessonItems[currentItemIdx];
  const expectedChar = target[currentCharIdx];

  if (key === ' ' && expectedChar !== ' ') return;

  const isCorrect = key.toLowerCase() === expectedChar.toLowerCase();
  totalChars++;

  const keyEl = document.querySelector(`.key[data-key="${key === ' ' ? ' ' : key.toLowerCase()}"]`);

  if (isCorrect) {
    playCorrect();
    streak++;
    if (keyEl) { keyEl.classList.add('correct-flash'); setTimeout(() => keyEl.classList.remove('correct-flash'), 200); }

    const span = document.querySelector(`.target-char[data-idx="${currentCharIdx}"]`);
    if (span) { span.classList.remove('current'); span.classList.add('typed'); }

    currentCharIdx++;
    updateStreak();

    if (streak === 3 || streak === 6 || streak === 9) mascotBounce();

    if (currentCharIdx >= target.length) {
      // Item complete
      const wrap = document.getElementById('target-wrap');
      const rect = wrap.getBoundingClientRect();
      spawnConfetti(rect.left + rect.width/2, rect.top + rect.height/2);
      floatWord('✓ ' + target, rect.left + rect.width/2, rect.top);
      playWord();
      if (streak >= 5) mascotSpin();

      buildProgressDots();

      // Level 7 bonus: show full character reveal card
      // Levels 4-5: show mini flash card if name is a known character
      if (LEVELS[currentLevel].bonus) {
        revealActive = true;
        setTimeout(() => {
          showCharacterReveal(target, () => {
            // after dismiss
            currentItemIdx++;
            currentCharIdx = 0;
            buildProgressDots();
            if (currentItemIdx >= lessonItems.length) {
              setTimeout(showLessonComplete, 400);
            } else {
              renderTarget();
            }
          });
        }, 350);
      } else if (BONUS_CHARACTERS[target]) {
        // Mini flash card for known characters in levels 4-5
        currentItemIdx++;
        currentCharIdx = 0;
        buildProgressDots();
        setTimeout(() => {
          showCharacterFlash(target, () => {
            if (currentItemIdx >= lessonItems.length) {
              setTimeout(showLessonComplete, 400);
            } else {
              renderTarget();
            }
          });
        }, 250);
      } else {
        currentItemIdx++;
        currentCharIdx = 0;
        buildProgressDots();
        if (currentItemIdx >= lessonItems.length) {
          setTimeout(showLessonComplete, 600);
        } else {
          setTimeout(renderTarget, 500);
        }
      }
    } else {
      renderTarget();
    }
  } else {
    playWrong();
    mistakes++;
    streak = 0;
    updateStreak();
    if (keyEl) { keyEl.classList.add('wrong-flash'); setTimeout(() => keyEl.classList.remove('wrong-flash'), 300); }

    const span = document.querySelector(`.target-char[data-idx="${currentCharIdx}"]`);
    if (span) { span.classList.add('wrong'); setTimeout(() => span.classList.remove('wrong'), 300); }
  }
}

function showLessonComplete() {
  playFanfare();
  mascotSpin();

  const accuracy = totalChars > 0 ? Math.round(((totalChars - mistakes) / totalChars) * 100) : 100;
  const stars = accuracy >= 95 ? 3 : accuracy >= 80 ? 2 : 1;
  totalStars += stars;
  document.getElementById('star-count').textContent = totalStars;

  const nextLevel = currentLevel + 1 < LEVELS.length ? currentLevel + 1 : currentLevel;
  localStorage.setItem('typeles_progress', JSON.stringify({ level: nextLevel, stars: totalStars }));

  const hasNext = currentLevel + 1 < LEVELS.length;
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <h2>🎉 Goed gedaan!</h2>
    <div id="stars-display">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <p>Nauwkeurigheid: ${accuracy}%<br>Totale sterren: ${totalStars} ⭐</p>
    ${hasNext
      ? `<button class="btn" id="btn-next" onclick="nextLevel()">Volgende niveau →</button>`
      : `<h2 style="color:#ffd700">🏆 Je hebt alles gehaald!</h2>`
    }
    <button class="btn secondary" id="btn-repeat" onclick="repeatLevel()">Herhaal niveau</button>
    <p style="font-size:.8rem;color:#556;margin-top:-8px">of druk Enter om door te gaan</p>
  `;
  overlay.classList.remove('hidden');

  for (let i = 0; i < 5; i++) {
    setTimeout(() => spawnConfetti(Math.random()*window.innerWidth, Math.random()*window.innerHeight/2), i*200);
  }
}

function nextLevel() {
  currentLevel++;
  document.getElementById('overlay').classList.add('hidden');
  startLevel();
}
function repeatLevel() {
  document.getElementById('overlay').classList.add('hidden');
  startLevel();
}

// ==================== INPUT ====================
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.altKey || e.metaKey) return;

  // ── 1. Godmode buffer (always track, doesn't interfere with gameplay) ──
  if (e.key.length === 1) {
    godmodeBuffer += e.key.toLowerCase();
    if (godmodeBuffer.length > GODMODE_CODE.length) {
      godmodeBuffer = godmodeBuffer.slice(-GODMODE_CODE.length);
    }
    if (!godmodeActive && godmodeBuffer === GODMODE_CODE) {
      activateGodmode();
    }
  }

  // ── 2. Enter on main overlay triggers primary button ──
  if (e.key === 'Enter') {
    const overlay = document.getElementById('overlay');
    if (!overlay.classList.contains('hidden')) {
      e.preventDefault();
      // Primary button = first .btn that isn't .secondary
      const primaryBtn = overlay.querySelector('.btn:not(.secondary)');
      if (primaryBtn) { primaryBtn.click(); return; }
      // If only secondary buttons exist (e.g. all-complete screen), click first btn
      const anyBtn = overlay.querySelector('.btn');
      if (anyBtn) { anyBtn.click(); return; }
    }
  }

  // ── 3. Block all game input during character reveal ──
  if (revealActive) return;

  // ── 4. Normal game typing (overlay must be hidden) ──
  const overlay = document.getElementById('overlay');
  if (!overlay.classList.contains('hidden')) return;

  if (e.key.length === 1) {
    e.preventDefault();
    handleKey(e.key);
  }
});

// ==================== INIT ====================
initStars();
buildKeyboard();
window.addEventListener('resize', initStars);
</script>
